name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"
  # Opt all JS-based actions into Node 24. GitHub is forcing the move on
  # 2026-06-02; setting this now silences the deprecation warning emitted
  # for actions/checkout@v4 + setup-node@v4 + pnpm/action-setup@v4 +
  # cycjimmy/semantic-release-action@v4.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

# Serialize releases so two main-branch pushes cannot race for the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Lint, typecheck, knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      # Full history is required so semantic-release can inspect prior tags.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires modern npm with the OIDC handshake.
      - name: Upgrade npm (for trusted publishing / provenance)
        run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # Build both bundles up front. `npm publish` below reads dist/npm
      # via the `files` field in package.json; the GCS upload reads dist/.
      - run: pnpm build

      # semantic-release computes the next version, bumps package.json,
      # writes CHANGELOG.md, creates the GitHub release, and pushes the
      # [skip ci] commit + tag back to main. It does NOT publish to npm
      # here — its npm plugin requires NPM_TOKEN even with --provenance,
      # so the publish runs as a separate step below using OIDC.
      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Trusted-publishing-driven npm publish. By the time this runs,
      # semantic-release has bumped package.json's version. The id-token
      # write permission on the job lets `npm publish --provenance`
      # complete the OIDC handshake without an NPM_TOKEN.
      - name: Publish to npm with provenance
        if: steps.semantic.outputs.new_release_published == 'true'
        run: npm publish --access public --provenance

      # Below: only when semantic-release actually minted a release.
      # `new_release_published` is exposed by cycjimmy/semantic-release-action.

      - name: Auth to GCS
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - if: steps.semantic.outputs.new_release_published == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Upload CDN assets to GCS
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          PKG_VERSION="${{ steps.semantic.outputs.new_release_version }}"
          MAJOR="${PKG_VERSION%%.*}"
          VERSION_PATH="${{ secrets.GCS_BUCKET }}/v${MAJOR}/${PKG_VERSION}"
          LATEST_PATH="${{ secrets.GCS_BUCKET }}/v${MAJOR}/latest"
          gsutil -m rsync -r dist "$VERSION_PATH"
          gsutil -m rsync -r dist "$LATEST_PATH"
