name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"

permissions:
  contents: read

# Serialize releases so two main-branch pushes cannot race for the same tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Lint, typecheck, knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      # Full history is required so semantic-release can inspect prior tags.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      # The trusted-publishing flow expects modern npm; the existing release
      # path upgraded npm before publishing, kept here for parity.
      - name: Upgrade npm (for trusted publishing / provenance)
        run: npm install -g npm@latest

      - run: npm ci

      # Build both bundles up front. The npm publish below reads dist/npm
      # via the `files` field in package.json; the GCS upload reads dist/.
      - run: npm run build

      # semantic-release decides the next version, bumps package*.json, writes
      # CHANGELOG.md, publishes to npm with provenance, creates the GitHub
      # release, and pushes the [skip ci] commit + tag back to main.
      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'

      # Below: only when semantic-release actually minted a release.
      # `new_release_published` is exposed by cycjimmy/semantic-release-action.

      - name: Auth to GCS
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - if: steps.semantic.outputs.new_release_published == 'true'
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Upload CDN assets to GCS
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          PKG_VERSION="${{ steps.semantic.outputs.new_release_version }}"
          MAJOR="${PKG_VERSION%%.*}"
          VERSION_PATH="${{ secrets.GCS_BUCKET }}/v${MAJOR}/${PKG_VERSION}"
          LATEST_PATH="${{ secrets.GCS_BUCKET }}/v${MAJOR}/latest"
          gsutil -m rsync -r dist "$VERSION_PATH"
          gsutil -m rsync -r dist "$LATEST_PATH"
