# Git hooks managed by lefthook. Installed by the `prepare` npm script,
# so `pnpm install` sets them up automatically.
#
# Pre-commit: lint + format staged files only (fast).
# Commit-msg: enforce conventional commits for semantic-release.
# Pre-push: full check (lint, typecheck, knip) — catches type errors and
# dead code before they reach CI.

pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: '*.{ts,tsx,js,jsx,json,jsonc,scss}'
      run: pnpm exec biome check --no-errors-on-unmatched --staged --write {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}

pre-push:
  jobs:
    - name: check
      run: pnpm check
